openapi: 3.0.3
info:
  title: ProspFT RFQ API
  version: 1.0.0-draft
  description: |
    REST API для интеграции с модулем NewRFQ (запрос предложений на перевозку).
    Часовой пояс бизнес-логики лота и отчётов: `Europe/Moscow`.

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: rfq
    description: CRUD процедуры RFQ, публикация, копирование
  - name: suppliers
    description: Поставщики (перевозчики), приглашения, статистика участия
  - name: participation
    description: Заявки на участие, ответы на приглашения
  - name: results
    description: Результаты подачи предложений, файлы итогов
  - name: lot
    description: Данные кастомного лота
  - name: analysis
    description: Анализ предложений, победители, бюджет
  - name: nomination
    description: Номинация объёмов перевозчикам
  - name: distribution
    description: Распределение квот, подтверждение перевозчиком
  - name: documents
    description: Дополнительные соглашения на основе распределения
  - name: notifications
    description: Исходящие уведомления поставщикам
  - name: jobs
    description: Асинхронные задачи (отчёты, генерация документов, номинация)

paths:
  /rfq:
    get:
      tags: [rfq]
      operationId: listRfq
      summary: Список процедур RFQ
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: search
          in: query
          schema: { type: string }
          description: Поиск по title
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProcedureStatusFilter'
      responses:
        '200':
          description: Пагинированный список
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfqListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [rfq]
      operationId: createRfq
      summary: Создать процедуру RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RfqCreateRequest'
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfqDetail'
        '422':
          $ref: '#/components/responses/ValidationError'

  /rfq/{rfqId}:
    parameters:
      - $ref: '#/components/parameters/rfqId'

    get:
      tags: [rfq]
      operationId: getRfq
      summary: Получить процедуру RFQ
      responses:
        '200':
          description: Детальная карточка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfqDetail'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [rfq]
      operationId: updateRfq
      summary: Обновить процедуру RFQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RfqUpdateRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RfqDetail'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [rfq]
      operationId: deleteRfq
      summary: Удалить процедуру RFQ (soft delete)
      responses:
        '204':
          description: Удалено

  /rfq/{rfqId}/publish:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [rfq]
      operationId: publishRfq
      summary: Опубликовать процедуру
      responses:
        '200':
          description: Опубликовано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
    delete:
      tags: [rfq]
      operationId: unpublishRfq
      summary: Снять с публикации
      responses:
        '200':
          description: Снято с публикации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/copy:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [rfq]
      operationId: copyRfq
      summary: Копировать процедуру
      responses:
        '201':
          description: Копия создана
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: integer, format: int64 }

  /rfq/{rfqId}/next-tour:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [rfq]
      operationId: createNextTour
      summary: Создать следующий тур
      description: Копия RFQ и лота с привязкой `previous_rfq_id`.
      responses:
        '201':
          description: Новый тур
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id: { type: integer, format: int64 }

  /rfq/{rfqId}/title:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    patch:
      tags: [rfq]
      operationId: patchRfqTitle
      summary: Изменить заголовок
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, maxLength: 255 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/finish-date:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    patch:
      tags: [rfq]
      operationId: patchRfqFinishDate
      summary: Изменить дату окончания подачи
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [finish_datetime]
              properties:
                finish_datetime: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/organizer:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    patch:
      tags: [rfq]
      operationId: patchRfqOrganizer
      summary: Сменить организатора
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizer_user_id]
              properties:
                organizer_user_id: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/suppliers:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [suppliers]
      operationId: listRfqSuppliers
      summary: Список приглашённых поставщиков
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: invitation_status
          in: query
          schema:
            $ref: '#/components/schemas/SupplierInvitationStatus'
        - name: participation_status
          in: query
          schema:
            $ref: '#/components/schemas/SupplierParticipationStatus'
      responses:
        '200':
          description: Список записей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierListResponse'

  /rfq/{rfqId}/suppliers/statistics:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [suppliers]
      operationId: getRfqSupplierStatistics
      summary: Агрегированная статистика участия
      responses:
        '200':
          description: Счётчики по статусам
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierStatistics'

  /rfq/supplier-names:
    get:
      tags: [suppliers]
      operationId: listSupplierNames
      summary: Справочник имён поставщиков для фильтров
      responses:
        '200':
          description: Список компаний
          content:
            application/json:
              schema:
                type: object
                properties:
                  transporters:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompanyRef'
                  transporters_with_group:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompanyRef'

  /rfq/{rfqId}/suppliers/invite:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [suppliers]
      operationId: inviteSupplier
      summary: Пригласить компанию
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [company_id]
              properties:
                company_id: { type: integer }
                partner_id: { type: integer, nullable: true }
      responses:
        '201':
          description: Приглашение создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplierAccess'

  /rfq/{rfqId}/suppliers/{accessId}/exclude:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - $ref: '#/components/parameters/accessId'
    post:
      tags: [suppliers]
      operationId: excludeSupplier
      summary: Исключить поставщика из процедуры
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/participation-requests:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [participation]
      operationId: listParticipationRequests
      summary: Заявки на участие (self-service)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: Записи `new_rfq_request_participation`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipationRequestListResponse'

  /rfq/{rfqId}/participation-requests/{requestId}/accept:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: requestId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [participation]
      operationId: acceptParticipationRequest
      summary: Одобрить заявку на участие
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/participation-requests/{requestId}/decline:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: requestId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [participation]
      operationId: declineParticipationRequest
      summary: Отклонить заявку на участие
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/results:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [results]
      operationId: listRfqResults
      summary: Таблица результатов подачи
      description: JSON-аналог `getResultsData` / `DTGetRfqResultsService`.
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: company_id
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Строки результатов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListResponse'

  /rfq/{rfqId}/result-files:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [results]
      operationId: listResultFiles
      summary: Публичные файлы итогов
      responses:
        '200':
          description: Список файлов
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ResultFile'
    post:
      tags: [results]
      operationId: uploadResultFile
      summary: Загрузить файл итогов
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Загружено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultFile'

  /rfq/{rfqId}/result-files/{fileId}:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: fileId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [results]
      operationId: deleteResultFile
      summary: Удалить файл итогов
      responses:
        '204':
          description: Удалено

  /rfq/{rfqId}/lot:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [lot]
      operationId: getRfqLot
      summary: Получить структуру кастомного лота
      parameters:
        - name: company_id
          in: query
          schema: { type: integer }
          description: Для грузовладельца — просмотр подачи конкретной ТК
        - name: is_actual
          in: query
          schema: { type: integer, enum: [0, 1] }
          description: Для перевозчика — черновик (0) или актуальная подача (1)
      responses:
        '200':
          description: Структура лота для табличного UI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotPayload'

  /rfq/{rfqId}/lot/data:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    put:
      tags: [lot]
      operationId: saveRfqLotData
      summary: Сохранить данные лота перевозчиком
      description: BFF к Go `POST /{lotId}/saveData`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LotSaveRequest'
      responses:
        '200':
          description: Сохранено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LotSaveResponse'
        '422':
          description: Ошибка валидации ячеек / срока подачи

  /rfq/{rfqId}/reports:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [lot]
      operationId: createRfqReport
      summary: Запустить генерацию отчёта (async)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
      responses:
        '202':
          description: Задача поставлена в очередь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobRef'

  /rfq/{rfqId}/analysis/winners:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [analysis]
      operationId: getAnalysisWinners
      summary: Расчёт победителей (рейтинг / лучшая цена)
      parameters:
        - name: mode
          in: query
          schema:
            type: string
            enum: [rating, best_price, traffic_light]
      responses:
        '200':
          description: Матрица победителей по позициям
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WinnersAnalysis'

  /rfq/{rfqId}/analysis/winners/confirm:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [analysis]
      operationId: confirmWinners
      summary: Зафиксировать победителей
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selections:
                  type: array
                  items:
                    $ref: '#/components/schemas/WinnerSelection'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/budget:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [analysis]
      operationId: getBudget
      summary: Бюджетная сводка
      responses:
        '200':
          description: Данные бюджета
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetSummary'

  /rfq/{rfqId}/budget/participants:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [analysis]
      operationId: getBudgetParticipants
      summary: Участники для бюджетного отчёта
      responses:
        '200':
          description: Список company_id с флагами включения
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BudgetParticipant'

  /rfq/{rfqId}/budget/export:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [analysis]
      operationId: exportBudget
      summary: Экспорт бюджета в Excel
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                excluded_company_ids:
                  type: array
                  items: { type: integer }
      responses:
        '200':
          description: Файл
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /rfq/{rfqId}/budget-reports:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [analysis]
      operationId: listBudgetReports
      summary: История асинхронных бюджет-отчётов
      responses:
        '200':
          description: Список `new_rfq_budget_reports`
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BudgetReport'

  /rfq/{rfqId}/budget-reports/{reportId}/download:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: reportId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [analysis]
      operationId: downloadBudgetReport
      summary: Скачать готовый бюджет-отчёт
      responses:
        '200':
          description: Файл
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /rfq/{rfqId}/nomination/calculate:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [nomination]
      operationId: calculateNomination
      summary: Рассчитать номинацию
      description: |
        Синхронный расчёт распределения объёмов по линиям/маршрутам на основе
        поданных тарифов и параметров алгоритма.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NominationCalculateRequest'
      responses:
        '200':
          description: Результат расчёта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NominationResult'

  /rfq/{rfqId}/nomination/run:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [nomination]
      operationId: runNominationAsync
      summary: Запустить автоматическую номинацию (async)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NominationRunRequest'
      responses:
        '202':
          description: Задача в очереди
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobRef'

  /rfq/{rfqId}/nomination/apply:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [nomination]
      operationId: applyNomination
      summary: Применить строку/блок номинации
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NominationApplyRequest'
      responses:
        '200':
          description: Применено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NominationResult'

  /rfq/{rfqId}/nomination/scenarios:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [nomination]
      operationId: listNominationScenarios
      summary: Сохранённые сценарии номинации
      responses:
        '200':
          description: Список снимков расчёта
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NominationScenarioSummary'
    post:
      tags: [nomination]
      operationId: saveNominationScenario
      summary: Сохранить сценарий номинации
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, settings, result_data]
              properties:
                title: { type: string }
                settings: { type: object, additionalProperties: true }
                result_data: { type: object, additionalProperties: true }
      responses:
        '201':
          description: Сохранено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NominationScenario'

  /rfq/{rfqId}/nomination/scenarios/{scenarioId}:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: scenarioId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [nomination]
      operationId: getNominationScenario
      summary: Получить сценарий номинации
      responses:
        '200':
          description: Полный снимок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NominationScenario'

  /rfq/{rfqId}/nomination/import:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [nomination]
      operationId: importNomination
      summary: Импорт номинации из Excel
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Импортировано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NominationImportResult'

  /rfq/{rfqId}/nomination/export:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [nomination]
      operationId: exportNomination
      summary: Экспорт номинации в Excel
      responses:
        '200':
          description: Файл
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /rfq/{rfqId}/distributions:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [distribution]
      operationId: listRfqDistributions
      summary: Распределения по процедуре (грузовладелец)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DistributionStatus'
      responses:
        '200':
          description: Записи `new_rfq_distributions`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionListResponse'

  /rfq/distributions:
    get:
      tags: [distribution]
      operationId: listAllDistributions
      summary: Реестр распределений (грузовладелец, все RFQ)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: Список
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionListResponse'

  /rfq/my-distributions:
    get:
      tags: [distribution]
      operationId: listMyDistributions
      summary: Распределения текущей ТК
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/perPage'
      responses:
        '200':
          description: Список
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionListResponse'

  /rfq/{rfqId}/distributions/{distributionId}/confirm:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - $ref: '#/components/parameters/distributionId'
    post:
      tags: [distribution]
      operationId: confirmDistribution
      summary: Подтвердить распределение (перевозчик)
      responses:
        '200':
          description: Статус `confirmed`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Distribution'

  /rfq/{rfqId}/distributions/{distributionId}/decline:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - $ref: '#/components/parameters/distributionId'
    post:
      tags: [distribution]
      operationId: declineDistribution
      summary: Отклонить распределение (перевозчик)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Статус `declined`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Distribution'

  /rfq/{rfqId}/documents/upload:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [documents]
      operationId: uploadDistributionDocument
      summary: Загрузить Excel для формирования доп.соглашений
      description: |
        Запускает job парсинга номинации/распределения и генерации документов.
        Создаёт/обновляет `new_rfq_distributions`, `new_rfq_document_generations`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                category_id:
                  type: integer
                  description: ID шаблона категории договора
      responses:
        '202':
          description: Обработка в очереди
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobRef'

  /rfq/{rfqId}/documents/preview:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [documents]
      operationId: previewDocuments
      summary: Предпросмотр доп.соглашений
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentPreviewRequest'
      responses:
        '200':
          description: Массив превью по компаниям
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentPreview'

  /rfq/{rfqId}/documents/preview/save:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [documents]
      operationId: saveDocumentPreview
      summary: Сохранить выбранные превью в генерации
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batch_uuid, items]
              properties:
                batch_uuid: { type: string, format: uuid }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      company_id: { type: integer }
                      supplemental_agreement_number: { type: string }
      responses:
        '201':
          description: Созданы записи генерации
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentGeneration'

  /rfq/{rfqId}/document-generations:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    get:
      tags: [documents]
      operationId: listDocumentGenerations
      summary: История сгенерированных доп.соглашений
      parameters:
        - name: batch_uuid
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Список
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentGeneration'

  /rfq/{rfqId}/document-generations/{generationId}:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    delete:
      tags: [documents]
      operationId: deleteDocumentGeneration
      summary: Удалить генерацию
      responses:
        '204':
          description: Удалено

  /rfq/{rfqId}/document-generations/{generationId}/docx:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [documents]
      operationId: downloadDocumentDocx
      summary: Скачать DOCX
      responses:
        '200':
          content:
            application/vnd.openxmlformats-officedocument.wordprocessingml.document:
              schema:
                type: string
                format: binary

  /rfq/{rfqId}/document-generations/{generationId}/pdf:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [documents]
      operationId: downloadDocumentPdf
      summary: Скачать PDF
      responses:
        '200':
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /rfq/{rfqId}/document-generations/{generationId}/supplemental:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    patch:
      tags: [documents]
      operationId: updateSupplementalNumber
      summary: Обновить номер доп.соглашения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [supplemental_agreement_number]
              properties:
                supplemental_agreement_number: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentGeneration'

  /rfq/{rfqId}/document-generations/{generationId}/send-supplier-email:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [documents]
      operationId: sendDocumentSupplierEmail
      summary: Отправить документ поставщику по email
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/document-generations/{generationId}/send-edo:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [documents]
      operationId: sendDocumentEdo
      summary: Отправить документ в ЭДО
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /rfq/{rfqId}/document-generations/{generationId}/regenerate:
    parameters:
      - $ref: '#/components/parameters/rfqId'
      - name: generationId
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [documents]
      operationId: regenerateDocument
      summary: Перегенерировать документ
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobRef'

  /rfq/{rfqId}/notifications/suppliers:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [notifications]
      operationId: sendSupplierMessage
      summary: Массовое сообщение поставщикам
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, body, recipient_filter]
              properties:
                subject: { type: string }
                body: { type: string }
                recipient_filter:
                  type: string
                  enum: [all_invited, submitted, not_submitted, selected_company_ids]
                company_ids:
                  type: array
                  items: { type: integer }
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobRef'

  /rfq/{rfqId}/notifications/edit:
    parameters:
      - $ref: '#/components/parameters/rfqId'
    post:
      tags: [notifications]
      operationId: sendEditNotification
      summary: Уведомить поставщиков об изменении условий
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobRef'

  /jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [jobs]
      operationId: getJobStatus
      summary: Статус асинхронной задачи
      description: Polling endpoint для report/document/nomination jobs.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobStatus'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  parameters:
    rfqId:
      name: rfqId
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: ID записи `new_rfq.id`
    accessId:
      name: accessId
      in: path
      required: true
      schema:
        type: integer
      description: ID записи `new_rfq_access.id`
    distributionId:
      name: distributionId
      in: path
      required: true
      schema:
        type: integer
      description: ID записи `new_rfq_distributions.id`
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    perPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Ошибка валидации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'

  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
        code: { type: string }

    ValidationError:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    OkResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }

    Pagination:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        total_pages: { type: integer }

    ProcedureStatus:
      type: integer
      enum: [0, 1, 2, 3]
      description: |
        `procedure_status` из `new_rfq`:
        0 — не опубликовано, 1 — текущая, 2 — завершена, 3 — архив.

    ProcedureStatusFilter:
      type: string
      enum: [draft, running, completed, archived]
      description: |
        draft → `is_published=0`;
        running → опубликована, `finish >= now()`;
        completed → завершена в пределах месяца;
        archived → старше месяца после finish.

    SupplierInvitationStatus:
      type: integer
      enum: [0, 1, 2, 3]
      description: |
        `new_rfq_access.status`:
        0 — без ответа, 1 — согласие, 2 — условия не приняты, 3 — отказ.

    SupplierParticipationStatus:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]
      description: |
        `new_rfq_access.transporter_participation_status`:
        0 — не видели, 1-2 — приняли, 3 — подали, 4-5 — отказ.

    DistributionStatus:
      type: string
      enum: [pending, confirmed, declined]

    CompanyRef:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    RfqListItem:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        finish: { type: string, format: date-time }
        is_published: { type: boolean }
        procedure_status:
          $ref: '#/components/schemas/ProcedureStatus'
        type_view:
          type: integer
          description: 1 — рейтинг, 2 — лучшая цена, 3 — светофор
        creator_user:
          type: object
          properties:
            id: { type: integer }
            name: { type: string }
        transport_types:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              type: { type: string }

    RfqListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/RfqListItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    RfqCreateRequest:
      type: object
      required: [title, finish_datetime]
      properties:
        income_id: { type: string, nullable: true }
        title: { type: string, maxLength: 255 }
        name_for_human: { type: string, nullable: true }
        requirements: { type: string }
        finish_datetime: { type: string, format: date-time }
        late_submission_datetime: { type: string, format: date-time, nullable: true }
        contract_start_date: { type: string, format: date, nullable: true }
        contract_end_date: { type: string, format: date, nullable: true }
        access_type:
          type: string
          enum: [all, selected, groups]
        is_for_all: { type: boolean, default: false }
        lot_template_id:
          type: integer
          description: ID шаблона `customed_rfq_lots` для копирования
        type_view:
          type: integer
          enum: [1, 2, 3]
        traffic_light_type: { type: integer, nullable: true }
        prolongacia: { type: boolean, default: false }
        max_date_prolongacia: { type: string, format: date-time, nullable: true }
        can_questions: { type: boolean, default: true }
        finish_message: { type: string }
        change_message: { type: string }
        transport_type_ids:
          type: array
          items: { type: integer }
        supplier_company_ids:
          type: array
          items: { type: integer }
        supplier_emails:
          type: array
          items: { type: string, format: email }
        contacts:
          type: array
          items: { type: integer }
        user_access_ids:
          type: array
          items: { type: integer }
          description: Пользователи с доступом к редактированию RFQ

    RfqUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/RfqCreateRequest'
      description: Все поля опциональны (PATCH-семантика через PUT).

    RfqDetail:
      allOf:
        - $ref: '#/components/schemas/RfqListItem'
        - type: object
          properties:
            requirements: { type: string }
            late_submission_date_at: { type: string, format: date-time, nullable: true }
            contract_start_date: { type: string, format: date, nullable: true }
            contract_end_date: { type: string, format: date, nullable: true }
            published_at: { type: string, format: date-time, nullable: true }
            customed_lot_id: { type: integer, nullable: true }
            previous_rfq_id: { type: integer, nullable: true }
            statistics:
              type: object
              properties:
                total_invited: { type: integer }
                accepted_invitation: { type: integer }
                submitted_proposals: { type: integer }
                refused: { type: integer }
                havent_seen: { type: integer }
            welcome_emails:
              type: array
              items:
                type: object
                properties:
                  email: { type: string, format: email }
            contacts:
              type: array
              items:
                type: object
                properties:
                  id: { type: integer }
                  fio: { type: string }
                  email: { type: string }

    SupplierAccess:
      type: object
      properties:
        id: { type: integer }
        company_id: { type: integer }
        partner_id: { type: integer, nullable: true }
        invitation_status:
          $ref: '#/components/schemas/SupplierInvitationStatus'
        participation_status:
          $ref: '#/components/schemas/SupplierParticipationStatus'
        first_seen_at: { type: string, format: date-time, nullable: true }
        last_time_data_at: { type: string, format: date-time, nullable: true }
        company:
          $ref: '#/components/schemas/CompanyRef'

    SupplierListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SupplierAccess'
        pagination:
          $ref: '#/components/schemas/Pagination'

    SupplierStatistics:
      type: object
      properties:
        total_invited: { type: integer }
        accepted_invitation: { type: integer }
        submitted_proposals: { type: integer }
        refused: { type: integer }
        havent_seen: { type: integer }

    ParticipationRequestListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              company_id: { type: integer }
              status: { type: string }
              created_at: { type: string, format: date-time }
        pagination:
          $ref: '#/components/schemas/Pagination'

    ResultListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: true
            description: Строка результата (зависит от структуры лота)
        pagination:
          $ref: '#/components/schemas/Pagination'

    ResultFile:
      type: object
      properties:
        id: { type: integer }
        filename: { type: string }
        url: { type: string, format: uri }
        created_at: { type: string, format: date-time }

    LotSheet:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        data:
          type: array
          items:
            type: array
            items: {}
        cellModification: { type: object, additionalProperties: true }
        idsCells: { type: object, additionalProperties: true }

    LotPayload:
      type: object
      properties:
        name: { type: string }
        is_required_data_fill: { type: integer, enum: [0, 1] }
        sheets:
          type: array
          items:
            $ref: '#/components/schemas/LotSheet'
        max:
          type: array
          items: {}

    LotSaveRequest:
      type: object
      required: [data, is_actual]
      properties:
        is_actual: { type: integer, enum: [0, 1] }
        data:
          type: string
          description: JSON-строка с массивом листов (формат Go `processing.DataStruct`)
        language:
          type: string
          enum: [ru, en]
          default: ru

    LotSaveResponse:
      type: object
      properties:
        status: { type: string, example: success }
        message: { type: string }
        is_made_prolongation: { type: boolean }

    ReportCreateRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [classic, position, v2]
        include_supplier_contacts: { type: boolean, default: false }

    AsyncJobRef:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string }
        status: { type: string, enum: [queued] }

    AsyncJobStatus:
      type: object
      properties:
        job_id: { type: string }
        status:
          type: string
          enum: [queued, processing, completed, failed]
        progress_percent: { type: integer, minimum: 0, maximum: 100 }
        result:
          type: object
          nullable: true
          properties:
            download_url: { type: string, format: uri }
            error: { type: string }

    WinnerSelection:
      type: object
      properties:
        line_id: { type: string }
        company_id: { type: integer }
        rank: { type: integer }

    WinnersAnalysis:
      type: object
      properties:
        mode: { type: string }
        lines:
          type: array
          items:
            type: object
            properties:
              line_id: { type: string }
              line_name: { type: string }
              candidates:
                type: array
                items:
                  type: object
                  properties:
                    company_id: { type: integer }
                    price: { type: number }
                    rating: { type: number, nullable: true }
                    traffic_light: { type: string, enum: [green, yellow, red], nullable: true }
                    is_winner: { type: boolean }

    BudgetSummary:
      type: object
      additionalProperties: true

    BudgetParticipant:
      type: object
      properties:
        company_id: { type: integer }
        company_name: { type: string }
        included: { type: boolean }

    BudgetReport:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        created_at: { type: string, format: date-time }
        download_ready: { type: boolean }

    NominationCalculateRequest:
      type: object
      required: [algorithm]
      properties:
        algorithm:
          type: string
          enum: [best_rate, multi_carrier_per_line, period_based]
          description: |
            best_rate — один перевозчик на линию по лучшему тарифу;
            multi_carrier_per_line — несколько перевозчиков на линию по долям;
            period_based — номинация по периодам (неделя/месяц).
        parameters:
          type: object
          additionalProperties: true
          description: |
            Параметры алгоритма: target_coverage_percent, carriers_per_line,
            coefficient_rules, excluded_company_ids, line_filters и т.д.
        source:
          type: string
          enum: [submitted_rates, manual_matrix]
          default: submitted_rates

    NominationRunRequest:
      allOf:
        - $ref: '#/components/schemas/NominationCalculateRequest'
        - type: object
          properties:
            persist_scenario: { type: boolean, default: true }
            scenario_title: { type: string }

    NominationApplyRequest:
      type: object
      required: [line_id, allocations]
      properties:
        line_id: { type: string }
        allocations:
          type: array
          items:
            type: object
            required: [company_id, share_percent]
            properties:
              company_id: { type: integer }
              share_percent: { type: number, minimum: 0, maximum: 100 }
              volume: { type: number, nullable: true }

    NominationLineAllocation:
      type: object
      properties:
        line_id: { type: string }
        line_name: { type: string }
        required_volume: { type: number }
        allocated_volume: { type: number }
        coverage_percent: { type: number }
        carriers:
          type: array
          items:
            type: object
            properties:
              company_id: { type: integer }
              company_name: { type: string }
              share_percent: { type: number }
              volume: { type: number }
              unit_price: { type: number, nullable: true }

    NominationResult:
      type: object
      properties:
        rfq_id: { type: integer }
        algorithm: { type: string }
        metrics:
          type: object
          properties:
            coverage_percent: { type: number }
            budget_total: { type: number }
            lines_total: { type: integer }
            lines_fully_covered: { type: integer }
        lines:
          type: array
          items:
            $ref: '#/components/schemas/NominationLineAllocation'
        warnings:
          type: array
          items: { type: string }

    NominationScenarioSummary:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        algorithm: { type: string }
        created_at: { type: string, format: date-time }
        metrics:
          type: object
          properties:
            coverage_percent: { type: number }
            budget_total: { type: number }

    NominationScenario:
      allOf:
        - $ref: '#/components/schemas/NominationScenarioSummary'
        - type: object
          properties:
            settings: { type: object, additionalProperties: true }
            result_data: { type: object, additionalProperties: true }

    NominationImportResult:
      type: object
      properties:
        imported_rows: { type: integer }
        errors:
          type: array
          items:
            type: object
            properties:
              row: { type: integer }
              message: { type: string }

    Distribution:
      type: object
      properties:
        id: { type: integer }
        rfq_id: { type: integer }
        company_id: { type: integer }
        status:
          $ref: '#/components/schemas/DistributionStatus'
        data:
          type: object
          additionalProperties: true
          description: |
            JSON payload квот: линии, объёмы, тарифы, vendor_code, inn, edo_uid.
        status_changed_at: { type: string, format: date-time, nullable: true }
        decline_comment: { type: string, nullable: true }
        company:
          $ref: '#/components/schemas/CompanyRef'

    DistributionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Distribution'
        pagination:
          $ref: '#/components/schemas/Pagination'

    DocumentPreviewRequest:
      type: object
      required: [batch_uuid]
      properties:
        batch_uuid: { type: string, format: uuid }
        company_ids:
          type: array
          items: { type: integer }
        category_id: { type: integer }
        use_docx_template: { type: boolean, default: true }

    DocumentPreview:
      type: object
      properties:
        company_id: { type: integer }
        company_name: { type: string }
