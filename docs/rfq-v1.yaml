        payload: { type: object, additionalProperties: true }

    DocumentGeneration:
      type: object
      properties:
        id: { type: integer }
        rfq_id: { type: integer }
        batch_uuid: { type: string, format: uuid }
        company_id: { type: integer }
        inn: { type: string }
        company_display_name: { type: string }
        category_id: { type: integer }
        supplemental_agreement_number: { type: string }
        use_docx_template: { type: boolean }
        had_format_word: { type: boolean }
        had_format_pdf: { type: boolean }
        payload_json: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }